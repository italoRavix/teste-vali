<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Pontos Turísticos | Vali</title>

    <!-- Ícones - Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Fontes - Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
        href="https://fonts.googleapis.com/css2?family=Oi&family=Poppins:wght@300;400;500;600;700;800&display=swap" 
        rel="stylesheet"
    >

    <!-- Estilos -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/gerenciamento_ponto_turistico.css">
</head>

<body>

    <!-- Header global -->
    <div id="header-container"></div>

    <main id="main-crude-item">

        <section id="container-crude-item">

            <div id="secao-crude-item">

                <div id="cabecalho-crude-item">

                    <span id="icone-crude-item">
                        <i class="fas fa-map-marker-alt"></i>
                    </span>

                    <h1>Gerenciar Pontos Turísticos</h1>

                    <p>
                        Busque, edite, liste ou cadastre novas localizações da plataforma Vali.
                    </p>

                </div>

                <!-- BUSCA -->
                <form id="form-editar-cadastro-item">

                    <label for="busca-item-para-edicao">
                        Buscar localização
                    </label>

                    <div class="grupo-busca-item">

                        <input
                            type="text"
                            id="busca-item-para-edicao"
                            name="busca-localizacao-para-edicao"
                            placeholder="Digite um ID ou palavra-chave"
                            required
                        >

                        <button type="submit">
                            <i class="fas fa-search"></i>
                            Procurar
                        </button>

                    </div>

                </form>

                <!-- AÇÕES -->
                <div class="acoes-gerenciamento-item">
                
                    <a href="tela_cadastro_ponto_turistico.html" class="botao-gerenciamento">
                        <i class="fas fa-plus"></i>
                        Cadastrar nova localização
                    </a>
                
                    <button type="button" class="botao-gerenciamento" id="botao-listar-localizacoes">
                        <i class="fas fa-list"></i>
                        Listar localizações
                    </button>
                
                </div>
                
                <div id="lista-localizacoes" class="lista-localizacoes"></div>

            </div>

        </section>

        <!-- Elemento visual -->
        <img
            src="assets/img/garoto_com_celular_sem_fundo_adobe.png"
            id="imagem-item-cadastro"
            alt="Ilustração de um garoto usando celular"
        >

    </main>

    <script src="js/header.js"></script>
    <script src="js/config.js"></script>
    <script src="js/gerenciamento_ponto_turistico.js"></script>
    <script src="js/footer.js"></script>

</body>

</html>
