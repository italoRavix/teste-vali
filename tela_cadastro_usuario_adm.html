<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Administrador | Vali</title>

    <!-- Ícones - Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Fontes - Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
        href="https://fonts.googleapis.com/css2?family=Oi&family=Poppins:wght@300;400;500;600;700;800&display=swap" 
        rel="stylesheet"
    >

    <!-- Estilos -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/tela_cadastro_usuario_adm.css">
</head>

<body>

    <div id="header-container"></div>

    <main id="main-cadastro-adm">

        <section id="secao-cadastro-adm">
            <div id="container-cadastro-adm">

                <div id="cabecalho-cadastro-adm">
                    <span id="icone-cadastro-adm">
                        <i class="fas fa-user-shield"></i>
                    </span>

                    <h1>Cadastrar administrador</h1>

                    <p>
                        Crie uma conta administrativa para gerenciar cadastros, locais e informações da plataforma Vali.
                    </p>
                </div>

                <form id="form-cadastro-adm">

                    <label for="email-usuario-adm">E-mail</label>
                    <input
                        type="email"
                        id="email-usuario-adm"
                        name="email-usuario-adm"
                        placeholder="Digite o e-mail"
                        required
                    >

                    <div id="grupo-senhas-adm">
                        <div class="campo-cadastro-adm">
                            <label for="senha-usuario-adm">Senha</label>
                            <input
                                type="password"
                                id="senha-usuario-adm"
                                name="senha-usuario-adm"
                                placeholder="Digite a senha"
                                required
                            >
                        </div>

                        <div class="campo-cadastro-adm">
                            <label for="confirmacao-senha-usuario-adm">Confirmação de senha</label>
                            <input
                                type="password"
                                id="confirmacao-senha-usuario-adm"
                                name="confirmacao-senha-usuario-adm"
                                placeholder="Confirme a senha"
                                required
                            >
                        </div>
                    </div>

                    <div id="mensagem-cadastro-adm"></div>

                    <button type="submit" id="botao-cadastrar-adm">
                        Cadastrar administrador
                    </button>

                </form>

            </div>
        </section>

    </main>

    <script src="js/header.js"></script>
    <script src="js/tela_cadastro_usuario_adm.js"></script>
    <script src="js/footer.js"></script>

</body>

</html>
