<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Usuário | Vali</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/tela_cadastro.css">
</head>

<body>
    <main id="main-tela-cadastro">
        
        <div id="container-cadastro-item">
            <section id="secao-cadastro-item">
                <h2>Cadastrar Usuário</h2>

                <form id="form-cadastrar-item">
                    <label for="cadastrar-nome-usuario">Nome de usuário</label>
                    <input type="text" id="cadastrar-nome-usuario" name="cadastrar-nome-usuario" required>

                    <section id="secao-senha-usuario">
                        <label for="cadastrar-senha-usuario">Senha</label>
                        <input type="password" id="cadastrar-senha-usuario" name="cadastrar-senha-usuario" required>

                        <label for="cadastrar-confirmacao-senha-usuario">Confirmação de senha</label>
                        <input type="password" id="cadastrar-confirmacao-senha-usuario" name="cadastrar-confirmacao-senha-usuario" required>
                    </section>

                    <button type="submit">Cadastrar</button>
                </form>
            </section>
        </div>

    </main>

    <script src="js/footer.js"></script>
    <script src="js/cadastro_usuario.js"></script>

</body>
</html>
