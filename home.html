<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vali | Home</title>

    <!-- Ícones - Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Fontes - Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
        href="https://fonts.googleapis.com/css2?family=Oi&family=Poppins:wght@300;400;500;600;700;800&display=swap" 
        rel="stylesheet"
    >

    <!-- Estilos -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/home.css">
</head>

<body>

    <header class="cabecalho">
        <nav class="menu-navegacao conteudo-secao">

            <a href="home.html" class="logo-link">
                <img 
                    src="assets/img/logo_vali_tatu-sem-fundo.png" 
                    alt="Logo da Vali"
                    class="logo-imagem"
                >
            </a>

            <button 
                id="botao-abrir-menu" 
                class="fas fa-bars menu-botao-abrir"
                aria-label="Abrir menu"
            ></button>

            <ul class="menu-lista">
                <li class="menu-item menu-item-fechar">
                    <button 
                        id="botao-fechar-menu" 
                        class="fas fa-times menu-botao-fechar"
                        aria-label="Fechar menu"
                    ></button>
                </li>

                <li class="menu-item">
                    <a href="index.html" class="menu-link">Home</a>
                </li>

                <li class="menu-item">
                    <a href="catalogo.html" class="menu-link">Catálogo</a>
                </li>

                <li class="menu-item">
                    <a href="sobre.html" class="menu-link">Sobre nós</a>
                </li>

                <li class="menu-item">
                    <a href="login.html" class="menu-link">Login</a>
                </li>
            </ul>

        </nav>
    </header>

    <main>
        <section class="secao-hero">
            <div class="conteudo-secao hero-conteudo">

                <div class="hero-texto">
                    <h1 class="hero-titulo">Indo Praonde?</h1>

                    <p class="hero-descricao">
                        Diamantina tem os lugares que todo mundo ama, mas também tem os segredos que quase ninguém conhece. Aqui você encontra todos eles, além dos melhores eventos da cidade.
                    </p>

                    <div class="hero-acoes">
                        <a href="catalogo.html" class="botao-catalogo">
                            Descobrir lugares
                        </a>
                    </div>
                </div>

                <div class="hero-imagem-container">
                    <img 
                        src="assets/img/garota-no-banco.png" 
                        alt="Ilustração de uma garota sentada em um banco"
                        class="hero-imagem"
                    >
                </div>

            </div>
        </section>
        <!-- SEÇÃO DE FILTROS -->
        <section class="secao-filtros">
            <div class="conteudo-secao">

                <div class="filtros-container">

                    <button class="filtro-btn filtro-natureza" data-categoria="natureza">
                        Natureza
                    </button>

                    <button class="filtro-btn filtro-restaurantes" data-categoria="restaurantes">
                        Restaurantes
                    </button>

                    <button class="filtro-btn filtro-bares" data-categoria="bares">
                        Bares
                    </button>

                    <button class="filtro-btn filtro-eventos" data-categoria="eventos">
                        Eventos
                    </button>

                </div>

                </div>

            </div>
        </section>
        <!-- SEÇÃO DE LOCAIS -->
        <section class="secao-locais">
            <div class="conteudo-secao">

                <!-- Os locais serão inseridos aqui pelo JavaScript -->
                <div id="locais-container" class="locais-container"></div>

                <!-- Template reutilizável -->
                <template id="template-local-card">

                    <article class="local-card">

                        <h2 class="local-nome">
                            Nome do local
                        </h2>

                        <div class="local-carrossel">

                            <button
                                class="carrossel-botao carrossel-botao-anterior"
                                type="button"
                                aria-label="Imagem anterior"
                            >
                                &#10094;
                            </button>

                            <div class="carrossel-imagem-container">

                                <img
                                    src="assets/img/placeholder-local.jpg"
                                    alt="Imagem do local"
                                    class="carrossel-imagem"
                                >

                            </div>

                            <button
                                class="carrossel-botao carrossel-botao-proximo"
                                type="button"
                                aria-label="Próxima imagem"
                            >
                                &#10095;
                            </button>

                        </div>

                        <div class="carrossel-indicadores">

                            <span class="indicador ativo"></span>

                        </div>

                        <p class="local-descricao">
                            Descrição do local.
                        </p>

                        <p class="local-horario">
                            Horário de funcionamento.
                        </p>

                    </article>

                </template>

            </div>
        </section>
    </main>

    <script src="js/home.js"></script>
</body>

</html>
