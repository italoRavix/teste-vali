spring:
  application:
    name: projeto-vali

  datasource:
    url: jdbc:mysql://localhost:3306/vali?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

jwt:
  expiration: ${JWT_EXPIRATION:900000}
  key: ${JWT_KEY:}