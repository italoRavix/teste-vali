<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vali</title>

    <!-- Ícones - Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Fontes - Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oi&family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <div id="header-container"></div>

    <main id="main-login">

        <div id="container-login-cadastro">

            <section id="secao-login">
                <h1>Bem-vindo de volta</h1>
                <p>Acesse sua conta agora.</p>

                <button type="button" class="google-login-btn">
                    <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google">
                    <span>Continuar com Google</span>
                </button>

                <form id="form-login">
                    <label for="usuario_login">E-mail</label>
                    <input type="email" id="usuario_login" name="usuario_login" placeholder="Digite seu e-mail"
                        required>

                    <label for="senha_login">Senha</label>
                    <input type="password" id="senha_login" name="senha_login" placeholder="Digite sua senha" required>

                    <div id="mensagem-login"></div>

                    <button type="submit">
                        Entrar
                    </button>
                </form>
            </section>

            <section id="secao-cadastro">
                <h2>Criar conta</h2>
                <p>Cadastre-se para começar.</p>

                <form id="form-cadastro">
                    <label for="email_cadastro">E-mail</label>
                    <input type="email" id="email_cadastro" name="email_cadastro" placeholder="Digite seu e-mail"
                        required>

                    <label for="senha_cadastro">Senha</label>
                    <input type="password" id="senha_cadastro" name="senha_cadastro" placeholder="Digite sua senha"
                        required>

                    <label for="confirmar_senha_cadastro">Confirmar senha</label>
                    <input type="password" id="confirmar_senha_cadastro" name="confirmar_senha_cadastro" placeholder="Confirme sua senha"
                        required>

                    <div id="mensagem-cadastro"></div>

                    <button type="submit">
                        Cadastrar
                    </button>
                </form>
            </section>

        </div>

        <img src="assets/img/garoto_com_celular_sem_fundo_adobe.png" id="imagem-login-cadastro"
            alt="Ilustração de um garoto usando celular">

    </main>

    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/config.js"></script>
    <script src="js/login.js"></script>

</body>

</html>
