<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vali</title>

    <!-- Ícones - Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Fontes - Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
        href="https://fonts.googleapis.com/css2?family=Oi&family=Poppins:wght@300;400;500;600;700;800&display=swap" 
        rel="stylesheet"
    >

    <!-- Estilos -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <!-- Header global -->
    <div id="header-container"></div>

    <main id="main-login">

        <!-- Container principal de login e cadastro -->
        <div id="container-login-cadastro">

            <!-- Seção de Login -->
            <section id="secao-login">
                <h1>Bem-vindo de volta</h1>
                <p>Acesse sua conta agora.</p>

                <form id="form-login">
                    <label for="usuario_login">Usuário</label>
                    <input 
                        type="text" 
                        id="usuario_login" 
                        name="usuario_login" 
                        placeholder="Digite seu usuário" 
                        required
                    >

                    <label for="senha_login">Senha</label>
                    <input 
                        type="password" 
                        id="senha_login" 
                        name="senha_login" 
                        placeholder="Digite sua senha" 
                        required
                    >

                    <button type="submit">
                        Entrar
                    </button>
                </form>
            </section>

            <!-- Seção de Cadastro -->
            <section id="secao-cadastro">
                <h2>Criar conta</h2>
                <p>Cadastre-se para começar.</p>

                <form id="form-cadastro">
                    <label for="usuario_cadastro">Usuário</label>
                    <input 
                        type="text" 
                        id="usuario_cadastro" 
                        name="usuario_cadastro" 
                        placeholder="Digite seu usuário" 
                        required
                    >

                    <label for="email_cadastro">E-mail</label>
                    <input 
                        type="email" 
                        id="email_cadastro" 
                        name="email_cadastro" 
                        placeholder="Digite seu e-mail" 
                        required
                    >

                    <label for="senha_cadastro">Senha</label>
                    <input 
                        type="password" 
                        id="senha_cadastro" 
                        name="senha_cadastro" 
                        placeholder="Digite sua senha" 
                        required
                    >

                    <button type="submit">
                        Cadastrar
                    </button>
                </form>
            </section>

        </div>

        <!-- Elemento visual -->
        <img 
            src="assets/img/garoto_com_celular_sem_fundo_adobe.png" 
            id="imagem-login-cadastro" 
            alt="Ilustração de um garoto usando celular"
        >

    </main>

    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>

</body>

</html>
