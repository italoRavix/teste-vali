<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vali</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">

</head>

<body>
    <main id="main-login">
        
        <!-- Container Principal (Azul) -->
        <div id="container-login-cadastro">
            
            <!-- Seção de Login -->
            <section id="secao-login">
                <h2>Bem-vindo de volta</h2>
                <p>Acesse sua conta agora.</p>
                
                <form id="form-login">
                    <input type="text" id="usuario_login" name="usuario_login" placeholder="Usuário" required>
                    <input type="password" id="senha_login" name="senha_login" placeholder="Senha" required>
                    <button type="submit">Entrar</button>
                </form>
            </section>

            <!-- Seção de Cadastro -->
            <section id="secao-cadastro">
                <h2>Criar Conta</h2>
                <p>Cadastre-se para começar.</p>
                
                <form id="form-cadastro">
                    <input type="text" id="usuario_cadastro" name="usuario_cadastro" placeholder="Usuário" required>
                    <input type="email" id="email_cadastro" name="email_cadastro" placeholder="Senha" required>
                    <input type="password" id="senha_cadastro" name="senha_cadastro" placeholder="Confirmar senha" required>
                    <button type="submit">Cadastrar</button>
                </form>
            </section>
        </div>

        <!-- Elemento Visual -->
        <img src="assets/img/garoto_com_celular_sem_fundo_adobe.png" id="imagem-login-cadastro" alt="Ilustração de um garoto usando celular">

    </main>

    <script src="js/footer.js"></script>

</body>
</html>
